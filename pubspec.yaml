name: artisanarc
description: A self-contained, offline-first craft organisation app for personal use.
version: 1.1.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_local_localizations:
    sdk: flutter
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  get_it: ^7.6.0
  injectable: ^2.3.0
  go_router: ^12.1.0
  provider: ^6.1.1
  intl: 0.18.1
  animations: ^2.0.11
  google_fonts: ^6.1.0
  printing: ^5.12.0
  path_provider: ^2.1.2
  lottie: ^2.7.0
  qr_flutter: ^4.1.0
  qr_code_scanner: ^1.0.1
  image_picker: ^1.0.0
  url_launcher: ^6.1.14
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  share_plus: ^7.2.2
  file_picker: ^6.1.1
  uuid: ^4.0.0
  csv: ^6.0.0
  json_annotation: ^4.8.1
  permission_handler: ^11.2.0
  image: ^4.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.4
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  mockito: ^5.4.4
  json_serializable: ^6.7.1

flutter_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#F5F2FF"
  image: assets/icon/app_icon.png
  android_gravity: center
  ios_content_mode: center
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
