name: artisanarc
description: A self-contained, offline-first craft organisation app with professional features.
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  get_it: ^7.6.0
  injectable: ^2.3.0
  go_router: ^12.1.0
  provider: ^6.1.1
  intl: ^0.18.1
  animations: ^2.0.11
  google_fonts: ^6.1.0
  printing: ^5.12.0
  path_provider: ^2.1.2
  lottie: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.4
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  mockito: ^5.4.4

flutter_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  remove_alpha_ios: true

# Uncomment to enable splash screen
flutter_native_splash:
  color: "#F5F2FF"
  image: assets/icon/app_icon.png
  android_gravity: center
  ios_content_mode: center
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/